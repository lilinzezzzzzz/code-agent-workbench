#:schema https://developers.openai.com/codex/config-schema.json

# 日常后端开发固定使用 GPT-5.6 旗舰 Sol，避免 alias 路由策略变化。
model = "gpt-5.6-sol"

# 默认使用中等 reasoning effort，在推理质量、响应时间和 token 消耗之间取平衡。
model_reasoning_effort = "medium"

# 默认使用标准服务档位，不额外消耗 Fast mode credits；需要加速时可在会话中临时开启 /fast。
service_tier = "default"

# 支持 reasoning summary 的模型输出简短推理摘要，便于回看关键判断。
model_reasoning_summary = "concise"

# 默认使用较低输出详细度，减少冗余说明和 output token 消耗；复杂任务可在 prompt 中临时要求展开。
model_verbosity = "low"

# 使用文件方式保存 Codex 登录凭据，便于 VS Code 插件和 CLI 共享 ~/.codex/auth.json。
cli_auth_credentials_store = "file"

# 默认沟通风格：保持直接、务实、少废话。
personality = "pragmatic"

# 需要越权、联网、写出工作区等高风险动作时再弹确认。
approval_policy = "on-request"

# 允许读写当前 workspace，适合日常编码；不会给出全盘写权限。
sandbox_mode = "workspace-write"

# 默认使用缓存搜索；需要最新资料时在会话里显式要求联网查询。
web_search = "cached"

# 单次工具输出保留的 token 上限；控制长日志进入上下文的成本，必要时再针对性重跑/截取。
tool_output_token_limit = 8000

# 后台终端空轮询最长等待 10 分钟，适合较慢的测试、构建和服务启动。
background_terminal_max_timeout = 600000

# 保存会话历史，便于恢复上下文和排查之前的操作。
history.persistence = "save-all"

# 限制本地历史文件体积，避免长期使用后无限增长；当前为 100 MiB。
history.max_bytes = 104857600

notify = ["/Users/lilinze/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[sandbox_workspace_write]
# shell 命令默认不允许直接访问外网；依赖安装、curl 等需要按需审批。
network_access = true

# 除当前 workspace 外，额外允许写入 /tmp，方便测试、构建和临时产物。
writable_roots = ["/tmp"]

[features]
# 禁用跨会话 Memories，避免 Codex 保存或复用本地记忆上下文。
memories = false

# 禁用 Chronicle，不从近期屏幕上下文自动整理和生成记忆。
chronicle = false

# 禁用 JavaScript REPL，保持使用常规工具调用路径，不启用 JavaScript 运行时编排。
js_repl = false

[tools]
# 启用本地图片查看工具；GPT-5.6 支持 original/auto detail 保留原始尺寸。
view_image = true

[tools.web_search]
# 保持 top-level web_search = "cached"，搜索结果上下文保持中等，避免资料类问题信息不足。
context_size = "medium"

[agents]
# 最多同时打开 4 个 agent thread：包含根 agent 时，通常可并行运行 3 个直接子 agent。
max_threads = 4

# 仅允许根 agent 创建一层直接子 agent，禁止子 agent 继续递归派生。
max_depth = 1

# spawn_agents_on_csv 任务中每个 worker 默认最多运行 30 分钟。
job_max_runtime_seconds = 1800

[mcp_servers.openaiDeveloperDocs]
# 官方 OpenAI/Codex 文档 MCP，用于查询最新配置、模型和 API 文档。
url = "https://developers.openai.com/mcp"

# 文档 MCP 不作为启动硬依赖，避免网络或服务异常导致 Codex 无法启动。
required = false

# 官方文档 MCP 偶尔冷启动或长页面读取较慢，适当放宽超时。
startup_timeout_sec = 20
tool_timeout_sec = 120

# 项目级信任设置，覆盖全局配置；路径必须绝对且唯一，支持文件系统和 IDE 虚拟路径。
