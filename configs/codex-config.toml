#:schema https://developers.openai.com/codex/config-schema.json

# 日常后端开发默认模型。
model = "gpt-5.5"

# 质量优先：后端编码、排障和重构默认保留高推理；简单任务可在 prompt 中显式要求快速处理。
model_reasoning_effort = "high"

# Plan 模式影响后续执行路径，默认保留高推理，避免方案阶段省 token 造成返工。
plan_mode_reasoning_effort = "high"

# 支持 reasoning summary 的模型输出简短推理摘要，便于回看关键判断。
model_reasoning_summary = "concise"

# 输出详细度保持中等，兼顾回答完整性和 output token 成本。
model_verbosity = "medium"

# 使用文件方式保存 Codex 登录凭据，便于 VS Code 插件和 CLI 共享 ~/.codex/auth.json。
cli_auth_credentials_store = "file"

# 默认沟通风格：保持直接、务实、少废话。
personality = "pragmatic"

# 需要越权、联网、写出工作区等高风险动作时再弹确认。
approval_policy = "on-request"

# 允许读写当前 workspace，适合日常编码；不会给出全盘写权限。
sandbox_mode = "workspace-write"

# 默认使用缓存搜索；需要最新资料时在会话里显式要求联网查询。
web_search = "cached"

# 单次工具输出保留的 token 上限；控制长日志进入上下文的成本，必要时再针对性重跑/截取。
tool_output_token_limit = 8000

# 后台终端空轮询最长等待 10 分钟，适合较慢的测试、构建和服务启动。
background_terminal_max_timeout = 600000

# 保存会话历史，便于恢复上下文和排查之前的操作。
history.persistence = "save-all"

# 限制本地历史文件体积，避免长期使用后无限增长；当前为 100 MiB。
history.max_bytes = 104857600

[sandbox_workspace_write]
# shell 命令默认不允许直接访问外网；依赖安装、curl 等需要按需审批。
network_access = false

# 除当前 workspace 外，额外允许写入 /tmp，方便测试、构建和临时产物。
writable_roots = ["/tmp"]

[features]
# 开启 undo 支持，方便在 IDE 中回滚 Codex 生成的改动。
undo = true

[tools]
# 允许 Codex 读取本地图片，便于分析截图、设计稿和错误界面。
view_image = true

[tools.web_search]
# 保持 top-level web_search = "cached"，搜索结果上下文保持中等，避免资料类问题信息不足。
context_size = "medium"

[agents]
# 限制本地并发 agent 数量，避免显式多 agent 任务放大 token、延迟和本地资源消耗。
max_threads = 3
max_depth = 1
job_max_runtime_seconds = 1800

[mcp_servers.openaiDeveloperDocs]
# 官方 OpenAI/Codex 文档 MCP，用于查询最新配置、模型和 API 文档。
url = "https://developers.openai.com/mcp"

# 文档 MCP 不作为启动硬依赖，避免网络或服务异常导致 Codex 无法启动。
required = false

# 官方文档 MCP 偶尔冷启动或长页面读取较慢，适当放宽超时。
startup_timeout_sec = 20
tool_timeout_sec = 120

# 项目级信任设置，覆盖全局配置；路径必须绝对且唯一，支持文件系统和 IDE 虚拟路径。
